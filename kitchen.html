<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Kitchen</title>
    
    <!-- SEO Meta Tags -->
    <meta name="description" content="Bilal Abbasi's culinary corner. Sourdough baking, recipes, and food science.">
    <meta name="author" content="Bilal Abbasi">
    <meta name="robots" content="index, follow">
    
    <!-- Stylesheet: Controls how the kitchen page looks (imports index.css + overrides colors) -->
    <link rel="stylesheet" href="kitchen.css">
    
    <!-- Configuration Data: Shared config containing both professional and kitchen bio contents -->
    <script src="config.js"></script>
    
    <!-- Loader Script: Automatically inserts the KITCHEN_CONFIG details when loaded -->
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            // 1. Update browser tab title
            document.title = KITCHEN_CONFIG.name;
            
            // 2. Update main profile text headings & paragraphs
            document.getElementById("main-title").textContent = KITCHEN_CONFIG.name;
            document.getElementById("main-subtitle").textContent = KITCHEN_CONFIG.subtitle;
            document.getElementById("bio-text").textContent = KITCHEN_CONFIG.bio;
            
            // 3. Generate the kitchen/recipe links dynamically
            const linksList = document.getElementById("links-list");
            linksList.innerHTML = KITCHEN_CONFIG.links.map(link => `
                <a href="${link.url}" target="_blank" rel="noopener noreferrer" class="external-link">
                    ${link.label}
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="7" y1="17" x2="17" y2="7"></line>
                        <polyline points="7 7 17 7 17 17"></polyline>
                    </svg>
                </a>
            `).join("");
        });
    </script>
</head>
<body>

    <div class="app-wrapper">
        
        <!-- Header: Top bar with navigation. "kitchen me" is marked active here -->
        <header class="navbar">
            <ul class="nav-links">
                <li class="nav-item"><a href="index.html">professional me</a></li>
                <li class="nav-item"><a href="kitchen.html" class="active">kitchen me</a></li>
            </ul>
        </header>

        <!-- Main Content Area: Split into two columns -->
        <main class="main-content" id="me">
            
            <!-- Left Column: Biography headings and list of links -->
            <div class="info-column">
                <div class="heading-group">
                    <h1 class="main-title" id="main-title">loading...</h1>
                    <h2 class="main-subtitle" id="main-subtitle">loading...</h2>
                </div>
                
                <p class="bio-paragraph" id="bio-text">loading...</p>
                
                <div class="external-links" id="links-list">
                    <!-- Links list will be injected here -->
                </div>
            </div>

            <!-- Right Column: Visual Sourdough Sketch -->
            <div class="visual-column">
                <div class="sketch-container">
                    <img src="assets/kitchen_sketch.png" alt="Sourdough bread blueprint drawing" class="sketch-img">
                </div>
            </div>

        </main>

        <!-- Footer -->
        <footer class="footer">
            <p>&copy; 2026 Bilal Abbasi. All rights reserved.</p>
        </footer>

    </div>

</body>
</html>
